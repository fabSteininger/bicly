version: "3.9"

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    command: ["--dev"]
    environment:
      - PB_HOST=0.0.0.0
      - PB_PORT=8090
    volumes:
      - pb_data:/pb_data
      - ./backend/pb_hooks:/pb_hooks
      - ./backend/pb_migrations:/pb_migrations
    ports:
      - "8090:8090"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL:-/api}
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://pocketbase:8090}
      - VITE_BROUTER_MODE=${VITE_BROUTER_MODE:-direct}
      - VITE_BROUTER_PROXY=${VITE_BROUTER_PROXY:-/api/brouter/route}
      - VITE_BROUTER_DIRECT_URL=${VITE_BROUTER_DIRECT_URL:-https://brouter.de/brouter}
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - pocketbase

volumes:
  pb_data:
