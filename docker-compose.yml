version: "3.9"

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.22.14
    command: ["serve", "--http=0.0.0.0:8090"]
    working_dir: /pb
    volumes:
      - ./backend:/pb
    ports:
      - "8090:8090"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_BROUTER_MODE=${VITE_BROUTER_MODE:-direct}
      - VITE_BROUTER_PROXY=${VITE_BROUTER_PROXY:-http://localhost:8090/api/brouter/route}
      - VITE_BROUTER_DIRECT_URL=${VITE_BROUTER_DIRECT_URL:-https://brouter.de/brouter}
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - pocketbase
