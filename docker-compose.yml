version: '3.8'

services:
  bicly:
    build:
      context: ./frontend
      args:
        - VITE_BROUTER_DIRECT_URL=/brouter
    environment:
      - PRIVACY_MD=Add your privacy policy here.\n\nSecond paragraph.
      - IMPRESSUM_MD=Add your impressum here.\n\nSecond paragraph.
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - brouter
    restart: always

  brouter:
    image: ghcr.io/abrensch/brouter:latest
    volumes:
      - ./brouter/segments4:/segments4
    ports:
      - "17777:17777"
    restart: always
